services:
  pirate-dock:
    build: .
    container_name: pirate-dock
    restart: "no"              # On-demand only — never auto-restart unexpectedly
    # IMPORTANT: Do NOT use network_mode: host.
    cap_add:
      - NET_ADMIN              # Required for NordVPN/WireGuard tunnel inside container
      - SYS_MODULE             # Required for WireGuard kernel module
    devices:
      - /dev/net/tun
    ports:
      - "127.0.0.1:9876:9876" # API — localhost only
      - "127.0.0.1:9118:9118" # Jackett UI — localhost only
      - "6081:6081"           # xpra HTML5 — Tailscale Serve proxies this to the Tailnet URL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CONNECT=South_Africa
      - TECHNOLOGY=NordLynx
      - HOME=/root
      - XDG_CONFIG_HOME=/root/.config
      - XDG_DATA_HOME=/root/.local/share
      - JACKETT_PORT=9118
      - DISPLAY=:1
      - DISPLAY_URL=https://araminta.taild3f7b9.ts.net:8443/pirate/
    command: ["/bin/bash", "/app/scripts/run.sh"]
    volumes:
      - ./downloads:/downloads
      - ./scripts/token.txt:/run/pirate-dock/token:ro
      - ./.env:/app/.env:ro
      - pirate-dock-data:/data
    dns:
      - 1.1.1.1
      - 8.8.8.8
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv4.conf.all.src_valid_mark=1

volumes:
  pirate-dock-data:
